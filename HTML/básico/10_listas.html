<!DOCTYPE html>
<html>

<head>
    <title>Listas</title>
    <meta charset="UTF-8" />
</head>

<body>
    <h1>Minhas Compras</h1>
    <ul>
        <li>Arroz</li>
        <li>Feijão</li>
        <li>Bisteca</li>
    </ul>

    <h1>Lista de Prioridades</h1>
    <ol>
        <li>Treinar o que aprendi</li>
        <li>Revisar Vídeos</li>
    </ol>
    <ol reversed>
        <li>Pagar caro pra comer</li>
        <li>Viajar para lugar feio</li>
        <li>Não gastar com idiotice</li>
    </ol>
    <ol start="5">
        <li>Acordar</li>
        <li>Fazer Café</li>
        <li>Almoçar</li>
    </ol>
    <p>1. Responda</p>
    <ol type="a">
        <li>Qual o seu nome?</li>
        <li>Onde nasceu?</li>
    </ol>
</body>

</html>
